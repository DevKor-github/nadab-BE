spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        ddl-auto: validate
    show-sql: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

oauth:
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}

profile-image:
  env: prod
  base-url: ${PROFILE_IMAGE_BASE_URL}

app:
  cookie:
    secure: true
    same-site: Lax  # Cross-Site 허용 (프론트/백 도메인 분리된 상태)

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
    - ${FRONTEND_SERVER_URL}