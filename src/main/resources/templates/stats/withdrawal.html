<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>NADAB · Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --border: #2a2f3e;
      --accent: #6c8fff;
      --accent-2: #ff7eb3;
      --accent-3: #4de8c2;
      --text-1: #e8eaf2;
      --text-2: #8b91a8;
      --text-3: #4f556a;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 28px 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .page-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--text-2);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .refreshed-at {
      font-family: 'DM Mono', monospace;
      font-size: .75rem;
      color: var(--text-3);
    }
    .refreshed-at span { color: var(--text-2); }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font-family: 'Syne', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
    }
    .btn-refresh:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(108,143,255,.08);
    }
    .btn-refresh svg { width: 14px; height: 14px; }

    .health-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: 'DM Mono', monospace;
      font-size: .75rem;
      color: var(--text-2);
      transition: border-color .3s;
    }
    .health-bar.ok    { border-color: rgba(77,232,194,.45); }
    .health-bar.error { border-color: rgba(255,126,179,.45); }

    .health-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-3);
      transition: background .3s, box-shadow .3s;
    }
    .health-bar.ok .health-dot {
      background: var(--accent-3);
      box-shadow: 0 0 6px rgba(77,232,194,.7);
    }
    .health-bar.error .health-dot {
      background: var(--accent-2);
      box-shadow: 0 0 6px rgba(255,126,179,.7);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .25; }
    }
    .health-bar.loading .health-dot { animation: pulse 1.1s ease infinite; }
    .health-text { color: var(--text-1); font-weight: 500; }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      width: fit-content;
      margin-bottom: 28px;
    }
    .tab-link {
      text-decoration: none;
      padding: 7px 22px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-2);
      transition: background .2s, color .2s;
    }
    .tab-link:hover { color: var(--text-1); }
    .tab-link.active {
      background: var(--accent);
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-size: .9rem;
      font-weight: 700;
      color: var(--text-1);
    }
    .card-sub {
      margin-top: 6px;
      font-size: .78rem;
      color: var(--text-2);
    }
    .card-body { padding: 22px; }

    .table-wrap { overflow: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      font-size: .82rem;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--text-2);
      font-weight: 700;
      white-space: nowrap;
    }
    td { color: var(--text-1); }
    .mono { font-family: 'DM Mono', monospace; }
    .empty {
      color: var(--text-2);
      font-size: .82rem;
      padding: 8px 0;
    }
  </style>
</head>
<body>
<div class="page-header">
  <div class="page-title">NADAB · Stats</div>
  <div class="header-right">
    <div id="healthBar" class="health-bar loading">
      <span class="health-dot"></span>
      <span id="healthText" class="health-text">서버 확인 중…</span>
    </div>
    <div class="refreshed-at">
      마지막 갱신 <span th:text="${vm.refreshedAt}">-</span>
    </div>
    <button class="btn-refresh" onclick="location.reload()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13.5 8A5.5 5.5 0 1 1 9 2.6"/>
        <polyline points="9 1 13.5 2.6 12 7"/>
      </svg>
      새로고침
    </button>
  </div>
</div>

<div class="tabs">
  <a class="tab-link" th:classappend="${activeTab} == 'daily' ? ' active' : ''" th:href="@{/stats/daily}">일간</a>
  <a class="tab-link" th:classappend="${activeTab} == 'weekly' ? ' active' : ''" th:href="@{/stats/weekly}">주간</a>
  <a class="tab-link" th:classappend="${activeTab} == 'monthly' ? ' active' : ''" th:href="@{/stats/monthly}">월간</a>
  <a class="tab-link" th:classappend="${activeTab} == 'type' ? ' active' : ''" th:href="@{/stats/type}">유형</a>
  <a class="tab-link" th:classappend="${activeTab} == 'withdrawal' ? ' active' : ''" th:href="@{/stats/withdrawal}">탈퇴</a>
  <a class="tab-link" th:classappend="${activeTab} == 'total' ? ' active' : ''" th:href="@{/stats/total}">전체</a>
</div>

<div class="grid">
  <div class="card">
    <div class="card-header">
      <div class="card-title">탈퇴 사유 분포</div>
      <div class="card-sub">전체 탈퇴 사유 집계</div>
    </div>
    <div class="card-body">
      <canvas id="reasonChart" height="120"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">탈퇴 이벤트 목록 (최신순)</div>
      <div class="card-sub">표는 최신 <span class="mono" th:text="${vm.recentEventLimit}">100</span>개 이벤트를 표시합니다.</div>
    </div>
    <div class="card-body">
      <div class="table-wrap" th:if="${!#lists.isEmpty(vm.rows)}">
        <table>
          <thead>
          <tr>
            <th>탈퇴 시각</th>
            <th>선택 사유</th>
            <th>기타 사유</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="row : ${vm.rows}">
            <td class="mono" th:text="${row.withdrawnAt}"></td>
            <td th:text="${row.reasons}"></td>
            <td th:text="${row.customReason}"></td>
          </tr>
          </tbody>
        </table>
      </div>
      <div class="empty" th:if="${#lists.isEmpty(vm.rows)}">표시할 탈퇴 이벤트가 없습니다.</div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  const labels = [[${vm.reasonLabels}]];
  const counts = [[${vm.reasonCounts}]].map(v => parseInt(v, 10));

  Chart.defaults.color = '#8b91a8';
  Chart.defaults.font.family = "'DM Mono', monospace";

  new Chart(document.getElementById('reasonChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '선택 횟수',
        data: counts,
        backgroundColor: 'rgba(108,143,255,0.8)',
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.06)' } },
        y: { beginAtZero: true, ticks: { precision: 0, stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.06)' } }
      }
    }
  });

  async function checkHealth() {
    const bar = document.getElementById('healthBar');
    const text = document.getElementById('healthText');
    try {
      const res = await fetch('/health', { cache: 'no-store' });
      if (res.ok) {
        bar.className = 'health-bar ok';
        text.textContent = 'SERVER OK';
      } else {
        bar.className = 'health-bar error';
        text.textContent = `ERROR ${res.status}`;
      }
    } catch {
      bar.className = 'health-bar error';
      text.textContent = 'UNREACHABLE';
    }
  }

  checkHealth();
  setInterval(checkHealth, 30_000);
</script>
</body>
</html>
