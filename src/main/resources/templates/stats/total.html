<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin - Total Stats</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container-fluid py-3">
  <ul class="nav nav-tabs mb-3">
    <li class="nav-item">
      <a class="nav-link"
         th:classappend="${activeTab} == 'daily' ? 'active' : ''"
         th:href="@{/admin/stats/daily}">일간</a>
    </li>
    <li class="nav-item">
      <a class="nav-link"
         th:classappend="${activeTab} == 'total' ? 'active' : ''"
         th:href="@{/admin/stats/total}">전체</a>
    </li>
  </ul>

  <div class="alert alert-secondary">전체 통계는 다음 단계에서 추가</div>
</div>
</body>
</html>
