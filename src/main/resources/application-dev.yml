spring:
  config:
    import: optional:file:.env[.properties]
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        ddl-auto: validate
    show-sql: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
    - ${SWAGGER_SERVER_URL}
