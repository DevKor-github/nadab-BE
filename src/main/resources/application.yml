spring:
  application:
    name: nadab

  profiles:
    active: local

  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

springdoc:
  api-docs:
    enabled: false   # 공통: 기본 꺼두기
  swagger-ui:
    path: /swagger-ui.html

token:
  jwt-secret: ${JWT_SECRET}
  access-token-expiration: 3600000  # 1시간 (밀리초)
  refresh-token-expiration: 1209600000  # 14일 (밀리초)

cloud:
  aws:
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${IAM_ACCESS_KEY}
      secret-key: ${IAM_SECRET_KEY}
    s3:
      bucket: ${BUCKET_NAME}

app:
  cookie:
    secure: false
    same-site: Lax

api_prefix: /api/v1